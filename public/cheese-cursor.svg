<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <!-- A small cheese wedge: triangular slice with holes -->
  <defs>
    <linearGradient id="cheese-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCC640"/>
      <stop offset="100%" stop-color="#E0A60A"/>
    </linearGradient>
  </defs>
  <!-- Drop shadow -->
  <path d="M5 6 L29 18 L5 30 Z" fill="rgba(0,0,0,0.35)" transform="translate(1.5 1.5)"/>
  <!-- Cheese body -->
  <path d="M5 6 L29 18 L5 30 Z" fill="url(#cheese-grad)" stroke="#3A1474" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Holes -->
  <circle cx="11" cy="14" r="1.6" fill="#3A1474"/>
  <circle cx="18" cy="20" r="1.9" fill="#3A1474"/>
  <circle cx="13" cy="23" r="1.3" fill="#3A1474"/>
  <circle cx="22" cy="17" r="1.1" fill="#3A1474"/>
</svg>
